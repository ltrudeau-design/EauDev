  Generates EauDev hook scripts on demand. Accepts a description of desired
  hook behaviour and produces a conformant Python hook script following the
  EauDev hook protocol (JSON input/output, additionalContext or decision fields).
  Handles PreToolUse, PostToolUse, and SessionStart hook types.


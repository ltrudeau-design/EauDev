  namespaces: []
  snapshot_path: ""
  update_cadence: "not applicable"

constraints: >
  Generates hooks conformant to the EauDev hook protocol only. Does not generate
  arbitrary Python scripts. Output must be directly executable as an EauDev hook.

lifecycle_mode: one_shot

spawn_trigger: >
  Spawn when user wants to create a new EauDev hook — a PreToolUse, PostToolUse,
  or SessionStart hook that modifies EauDev's behaviour at specific lifecycle points.

